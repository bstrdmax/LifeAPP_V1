<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeDesk • Personal Life Operations</title>
  
  <!-- Critical: Load SDKs first -->
  <script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <link rel="stylesheet" href="style.css">
  <style>
    /* Immediate visual feedback if main-content is empty */
    #main-content:empty {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
    }
    #main-content:empty::after {
      content: 'Initializing Systems...';
      color: rgba(255,255,255,0.3);
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="app">
    <nav class="sidebar" id="sidebar">
      <div class="logo">LifeDesk</div>
      <ul id="nav-list">
        <li data-view="dashboard" class="active">Dashboard</li>
        <li data-view="reminders">Reminders</li>
        <li data-view="assessments">Assessments</li>
        <li data-view="vault">Vault</li>
        <li data-view="family">Family</li>
      </ul>
      <div class="user-info">
        <span id="userName">Syncing...</span>
        <button id="logoutBtn">Logout</button>
      </div>
    </nav>

    <main id="main-content"></main>

    <nav class="bottom-nav">
      <button data-view="dashboard">🏠</button>
      <button data-view="reminders">🔔</button>
      <button data-view="assessments">📋</button>
      <button data-view="vault">🔐</button>
      <button data-view="family">👥</button>
    </nav>
  </div>

  <!-- Main Application Logic -->
  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeDesk · Personal Life Operations</title>
  <!-- External dependencies: date-fns for reliable date handling, Supabase client -->
  <script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Our own stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- DESKTOP SIDEBAR (hidden on mobile) -->
    <nav class="sidebar" id="sidebar">
      <div class="logo">LifeDesk</div>
      <ul>
        <li data-view="dashboard" class="active">Dashboard</li>
        <li data-view="reminders">Reminders</li>
        <li data-view="assessments">Assessments</li>
        <li data-view="vault">Vault</li>
        <li data-view="family">Family</li>
      </ul>
      <div class="user-info">
        <span id="userName">Loading...</span>
        <button id="logoutBtn">Logout</button>
      </div>
    </nav>

    <!-- MAIN CONTENT AREA (injected by JavaScript) -->
    <main id="main-content"></main>

    <!-- MOBILE BOTTOM NAVIGATION (appears only on small screens) -->
    <nav class="bottom-nav">
      <button data-view="dashboard">🏠</button>
      <button data-view="reminders">⏰</button>
      <button data-view="assessments">📊</button>
      <button data-view="vault">📁</button>
      <button data-view="family">👪</button>
    </nav>
  </div>

  <!-- MODAL for creating/editing reminders (hidden by default) -->
  <div id="reminderModal" class="modal">
    <div class="modal-content glass">
      <span class="close">&times;</span>
      <h2 id="modalTitle">New Reminder</h2>
      <form id="reminderForm">
        <input type="hidden" id="reminderId">
        <input type="text" id="title" placeholder="Title" required>
        <textarea id="description" placeholder="Description"></textarea>
        <select id="categoryId" required>
          <option value="">Select category</option>
        </select>
        <input type="datetime-local" id="dueDate" required>
        <input type="number" id="recurrenceInterval" placeholder="Repeat every (days)">
        <input type="number" id="costMin" placeholder="Min cost if missed">
        <input type="number" id="costMax" placeholder="Max cost if missed">
        <button type="submit">Save</button>
      </form>
    </div>
  </div>

  <!-- Main JavaScript (deferred to ensure DOM is ready) -->
  <script src="app.js"></script>
</body>
</html>
